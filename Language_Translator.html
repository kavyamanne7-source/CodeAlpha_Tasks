<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Translator</title>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#dfdfdf,#764ba2);
    padding:20px;
}

.container{
    background:#fff;
    width:420px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:15px;
    color:#333;
}


textarea{
    width:100%;
    height:140px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    resize:none;
    font-size:15px;
}


.langs{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
}

select{
    width:48%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#e415d0;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#f09be4;
    transform:scale(1.03);
}

hr{
    margin:20px 0;
    border:0.5px solid #ddd;
}


.outputBox{
    position:relative;
}


.outputBox textarea{
    padding-top:35px;
}


.iconBtns{
    position:absolute;
    top:8px;
    right:10px;
    display:flex;
    gap:12px;
    z-index:10;
}

.iconBtns i{
    font-size:18px;
    cursor:pointer;
    color:#e415d0;
    transition:0.2s;
}

.iconBtns i:hover{
    color:#f09be4;
    transform:scale(1.2);
}
</style>
</head>

<body>

<div class="container">

    <h2>🌐 Language Translator</h2>

    <!-- INPUT -->
    <textarea id="inputText" placeholder="Type your text here..."></textarea>

    <div class="langs">
        <select id="sourceLang">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="fr">French</option>
            <option value="te">Telugu</option>
        </select>

        <select id="targetLang">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="te">Telugu</option>
        </select>
    </div>

    <button onclick="translateText()">🌐 Translate</button>

    <hr>

    
    <div class="outputBox">

        <textarea id="outputText" readonly placeholder="Translation will appear here..."></textarea>

        <div class="iconBtns">
            <i class="fa-solid fa-copy" onclick="copyOutput()" title="Copy"></i>
            <i class="fa-solid fa-volume-high" onclick="speakText()" title="Speak"></i>
        </div>

    </div>

</div>

<script>

async function translateText() {

    let text = document.getElementById("inputText").value;
    let source = document.getElementById("sourceLang").value;
    let target = document.getElementById("targetLang").value;

    if(text.trim() === ""){
        alert("Please enter some text");
        return;
    }

    let url =
    `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source}|${target}`;

    try{
        let response = await fetch(url);
        let data = await response.json();

        document.getElementById("outputText").value =
        data.responseData.translatedText;
    }
    catch(error){
        alert("Translation failed!");
    }
}
function copyOutput(){
    navigator.clipboard.writeText(
        document.getElementById("outputText").value
    );
    alert("Translated text copied!");
}

function speakText(){

    let text = document.getElementById("outputText").value;

    if(text.trim()===""){
        alert("No text to speak!");
        return;
    }

    let utterance = new SpeechSynthesisUtterance(text);

    let lang = document.getElementById("targetLang").value;

    switch(lang){
        case "hi": utterance.lang = "hi-IN"; break;
        case "fr": utterance.lang = "fr-FR"; break;
        case "te": utterance.lang = "te-IN"; break;
        default: utterance.lang = "en-US";
    }

    speechSynthesis.speak(utterance);
}

</script>

</body>
</html>
